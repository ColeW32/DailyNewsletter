name: Daily Newsletter

on:
  schedule:
    # 14:30 UTC = 10:30am ET (EDT). GitHub's free cron often runs 30–90 min late,
    # but the job no longer skips on a delayed run — it just sends a bit later.
    # NOTE: in winter (EST) this is 9:30am ET; switch to '30 15 * * *' in early
    # November to stay ~10:30am ET. The broadcast dedup prevents any double-send.
    - cron: '30 14 * * *'
  workflow_dispatch: {} # run it manually anytime from the Actions tab

concurrency:
  group: daily-newsletter
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Generate & send the newsletter
        run: npm run generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Set these two repo *Variables* to go live to the whole list:
          #   SEND_MODE=broadcast  and  RESEND_AUDIENCE_ID=<your audience id>
          # Unset → stays in test mode (emails NEWSLETTER_TO).
          SEND_MODE: ${{ vars.SEND_MODE }}
          RESEND_AUDIENCE_ID: ${{ vars.RESEND_AUDIENCE_ID }}
